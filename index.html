
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
.wrap{padding:1rem 0;max-width:680px}
.progress-bar{height:6px;background:var(--color-background-secondary);border-radius:3px;margin-bottom:1.5rem;overflow:hidden}
.progress-fill{height:100%;background:#1D9E75;border-radius:3px;transition:width 0.4s}
.module-header{margin-bottom:1.5rem}
.module-tag{font-size:12px;font-weight:500;color:#0F6E56;background:#E1F5EE;padding:4px 12px;border-radius:20px;display:inline-block;margin-bottom:8px}
.module-title{font-size:22px;font-weight:500;color:var(--color-text-primary);line-height:1.3;margin-bottom:6px}
.module-sub{font-size:14px;color:var(--color-text-secondary);line-height:1.6}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.card-title{font-size:15px;font-weight:500;color:var(--color-text-primary);margin-bottom:0.5rem}
.card-body{font-size:14px;color:var(--color-text-secondary);line-height:1.7}
.highlight-box{background:#E1F5EE;border-left:3px solid #1D9E75;border-radius:0 8px 8px 0;padding:1rem 1.25rem;margin:1rem 0}
.highlight-box p{font-size:14px;color:#085041;line-height:1.7}
.warn-box{background:#FAEEDA;border-left:3px solid #EF9F27;border-radius:0 8px 8px 0;padding:1rem 1.25rem;margin:1rem 0}
.warn-box p{font-size:14px;color:#633806;line-height:1.7}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:1rem 0}
.stat-card{background:var(--color-background-secondary);border-radius:8px;padding:1rem;text-align:center}
.stat-num{font-size:28px;font-weight:500;color:var(--color-text-primary)}
.stat-label{font-size:12px;color:var(--color-text-secondary);margin-top:4px}
.quiz-option{display:block;width:100%;text-align:left;background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:8px;padding:0.75rem 1rem;margin-bottom:0.5rem;font-size:14px;cursor:pointer;color:var(--color-text-primary);transition:background 0.2s}
.quiz-option:hover{background:var(--color-background-secondary)}
.quiz-option.correct{background:#E1F5EE;border-color:#1D9E75;color:#085041;font-weight:500}
.quiz-option.wrong{background:#FCEBEB;border-color:#E24B4A;color:#501313}
.quiz-option:disabled{cursor:default}
.feedback{font-size:13px;padding:0.75rem 1rem;border-radius:8px;margin-top:0.5rem;line-height:1.6}
.feedback.ok{background:#E1F5EE;color:#085041}
.feedback.no{background:#FCEBEB;color:#501313}
.nav-row{display:flex;gap:12px;margin-top:1.5rem;flex-wrap:wrap}
.btn{padding:0.6rem 1.25rem;border-radius:8px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);font-size:14px;cursor:pointer;color:var(--color-text-primary);font-weight:500}
.btn:hover{background:var(--color-background-secondary)}
.btn.primary{background:#1D9E75;color:#fff;border-color:#1D9E75}
.btn.primary:hover{background:#0F6E56}
.btn:disabled{opacity:0.4;cursor:default}
.img-diagram{width:100%;border-radius:8px;margin:1rem 0}
.table-wrap{overflow-x:auto;margin:1rem 0}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--color-background-secondary);color:var(--color-text-primary);font-weight:500;padding:8px 12px;text-align:left;border:0.5px solid var(--color-border-tertiary)}
td{padding:8px 12px;border:0.5px solid var(--color-border-tertiary);color:var(--color-text-secondary)}
tr:nth-child(even) td{background:var(--color-background-secondary)}
.section-nav{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.5rem}
.section-btn{padding:4px 12px;border-radius:20px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);font-size:12px;cursor:pointer;color:var(--color-text-secondary)}
.section-btn.active{background:#1D9E75;color:#fff;border-color:#1D9E75}
.section-btn.done{background:#E1F5EE;color:#0F6E56;border-color:#9FE1CB}
.hidden{display:none}
.score-big{font-size:48px;font-weight:500;color:#1D9E75;text-align:center;margin:1rem 0}
.medal{font-size:48px;text-align:center;margin:1rem 0}
</style>

<div class="wrap" id="app"></div>

<script>
const modules = [
  {
    id:0, tag:"Introducción", title:"¿Qué es la norma API 9A?",
    content: `
      <div class="card">
        <div class="card-title">Origen y propósito</div>
        <div class="card-body">La norma <strong>API Spec 9A</strong> (Specification for Wire Rope) es publicada por el <em>American Petroleum Institute</em>. Establece los requisitos mínimos de fabricación, materiales, dimensiones, propiedades mecánicas, pruebas e inspección de cables de alambre (wire rope) usados en operaciones de perforación, producción y workover de pozos de petróleo y gas.</div>
      </div>
      <div class="highlight-box"><p>La norma aplica a cables de acero utilizados en: <strong>aparejos de perforación, cables de perforación (drilling line), cables de bomba de varilla, líneas de wireline y cables de servicio</strong> en la industria O&G.</p></div>
      <div class="grid2">
        <div class="stat-card"><div class="stat-num">9A</div><div class="stat-label">Código API</div></div>
        <div class="stat-card"><div class="stat-num">26ª</div><div class="stat-label">Edición vigente</div></div>
        <div class="stat-card"><div class="stat-num">1898</div><div class="stat-label">Año fundación API</div></div>
        <div class="stat-card"><div class="stat-num">Wire Rope</div><div class="stat-label">Objeto de la norma</div></div>
      </div>
      <div class="warn-box"><p><strong>¿Por qué es crítica?</strong> El cable de perforación es uno de los componentes con mayor carga dinámica en un taladro. Una falla de cable puede ocasionar pérdida de la sarta, accidentes fatales y pérdidas económicas millonarias.</p></div>
    `,
    quiz: { q:"¿Cuál es el principal propósito de la API 9A?", opts:["Regular el diseño de torres de perforación","Establecer requisitos para cables de alambre en O&G","Definir procedimientos de mantenimiento de bombas","Controlar la calidad del cemento de pozos"], ans:1, fb:"¡Correcto! La API 9A especifica los requisitos de fabricación, materiales, dimensiones y pruebas de cables de alambre (wire rope) para la industria del petróleo y gas." }
  },
  {
    id:1, tag:"Capítulo 1", title:"Alcance y definiciones clave",
    content: `
      <div class="card">
        <div class="card-title">Alcance de la norma</div>
        <div class="card-body">La API 9A cubre cables de alambre para uso en equipos de perforación y workover de pozos de petróleo y gas. Incluye requisitos para cables de múltiples usos dentro de las operaciones del taladro.</div>
      </div>
      <div class="card">
        <div class="card-title">Definiciones esenciales</div>
        <div class="card-body">
          <div style="margin-bottom:10px"><strong style="color:var(--color-text-primary)">Wire Rope (Cable de alambre):</strong> Conjunto de alambres de acero agrupados en torones, los cuales se enrollan alrededor de un alma central.</div>
          <div style="margin-bottom:10px"><strong style="color:var(--color-text-primary)">Torón (Strand):</strong> Conjunto de alambres individuales helicoidalmente enrollados alrededor de un núcleo.</div>
          <div style="margin-bottom:10px"><strong style="color:var(--color-text-primary)">Alma (Core):</strong> Elemento central del cable, puede ser de fibra (FC), alma de alambre independiente (IWRC) o alma de torón de alambre (WSC).</div>
          <div style="margin-bottom:10px"><strong style="color:var(--color-text-primary)">Lay:</strong> Dirección del enrollamiento de los torones alrededor del alma (derecha o izquierda).</div>
          <div><strong style="color:var(--color-text-primary)">Preformado:</strong> Proceso donde los alambres y torones toman una forma helicoidal permanente durante la fabricación.</div>
        </div>
      </div>
      <div class="highlight-box"><p><strong>Tipos de alma según API 9A:</strong><br>
      • <strong>FC</strong> – Fiber Core / Alma de fibra (natural o sintética)<br>
      • <strong>IWRC</strong> – Independent Wire Rope Core / Alma de cable de alambre independiente<br>
      • <strong>WSC</strong> – Wire Strand Core / Alma de torón de alambre</p></div>
    `,
    quiz: { q:"¿Qué significa IWRC en un cable según API 9A?", opts:["International Wire Rope Code","Independent Wire Rope Core","Internal Wire Resistance Class","Integrated Wire Rope Construction"], ans:1, fb:"¡Exacto! IWRC significa Independent Wire Rope Core (Alma de cable de alambre independiente). Es el tipo de alma más resistente y usado en cables de perforación pesada." }
  },
  {
    id:2, tag:"Capítulo 2", title:"Clasificación y construcción del cable",
    content: `
      <div class="card">
        <div class="card-title">Designación del cable: cómo leerla</div>
        <div class="card-body">Un cable se designa con una notación estándar: <strong>diámetro × (torones × alambres) × tipo de alma × lay</strong><br><br>Ejemplo: <strong>1-3/8" × 6×26 IWRC RRL</strong><br>• 1-3/8" = diámetro nominal<br>• 6 = número de torones<br>• 26 = número de alambres por torón<br>• IWRC = tipo de alma<br>• RRL = Regular Right Lay (paso derecho regular)</div>
      </div>
      <div class="table-wrap">
        <table>
          <tr><th>Clasificación</th><th>Torones × Alambres</th><th>Uso típico en taladro</th></tr>
          <tr><td>6×19</td><td>6 torones, 16-26 alambres</td><td>Cable de perforación, sand line</td></tr>
          <tr><td>6×36</td><td>6 torones, 27-49 alambres</td><td>Drilling line (alta flexibilidad)</td></tr>
          <tr><td>6×7</td><td>6 torones, 3-9 alambres</td><td>Cables de ancla, líneas fijas</td></tr>
          <tr><td>8×19</td><td>8 torones, 16-26 alambres</td><td>Cables de alta flexibilidad</td></tr>
        </table>
      </div>
      <div class="card">
        <div class="card-title">Tipos de lay (paso)</div>
        <div class="card-body">
          <strong>Por dirección:</strong><br>
          • <strong>Right Lay (R):</strong> Los torones se enrollan de izquierda a derecha (sentido horario)<br>
          • <strong>Left Lay (L):</strong> Los torones se enrollan de derecha a izquierda<br><br>
          <strong>Por relación alambre-torón:</strong><br>
          • <strong>Regular Lay:</strong> Los alambres se enrollan en sentido opuesto al torón (más rígido, resistente al aplastamiento)<br>
          • <strong>Lang's Lay:</strong> Los alambres se enrollan en el mismo sentido del torón (mayor superficie de contacto, más flexible)
        </div>
      </div>
      <div class="warn-box"><p><strong>Importante:</strong> El cable de perforación más usado en la industria es <strong>6×19 IWRC RRL</strong> (Regular Right Lay) por su equilibrio entre resistencia a la torsión, flexibilidad y durabilidad.</p></div>
    `,
    quiz: { q:"En la designación '6×26 IWRC RRL', ¿qué indica el '6'?", opts:["El diámetro del cable en pulgadas","El número de torones del cable","El número de alambres por torón","El tipo de paso del cable"], ans:1, fb:"¡Correcto! El primer número en la clasificación indica el número de torones. En este caso, 6 torones, cada uno con 26 alambres, con alma IWRC y paso derecho regular." }
  },
  {
    id:3, tag:"Capítulo 3", title:"Materiales y propiedades mecánicas",
    content: `
      <div class="card">
        <div class="card-title">Materiales de fabricación</div>
        <div class="card-body">Los alambres de un cable API 9A se fabrican en acero de alto carbono con tratamiento especial. La norma establece los grados según su resistencia a la tracción mínima.</div>
      </div>
      <div class="table-wrap">
        <table>
          <tr><th>Grado del cable</th><th>Denominación</th><th>Resistencia relativa</th></tr>
          <tr><td>IPS</td><td>Improved Plow Steel</td><td>Base (100%)</td></tr>
          <tr><td>EIPS</td><td>Extra Improved Plow Steel</td><td>+7.5% sobre IPS</td></tr>
          <tr><td>EEIPS</td><td>Extra Extra Improved Plow Steel</td><td>+7.5% sobre EIPS</td></tr>
          <tr><td>PS</td><td>Plow Steel</td><td>Por debajo de IPS</td></tr>
        </table>
      </div>
      <div class="highlight-box"><p><strong>En perforación se usa principalmente EIPS y EEIPS</strong> por su alta resistencia a la rotura. El grado EEIPS permite mayor carga nominal con el mismo diámetro de cable.</p></div>
      <div class="card">
        <div class="card-title">Propiedades mecánicas clave</div>
        <div class="card-body">
          <strong>Carga de rotura nominal (Catalog Strength):</strong> Carga mínima que garantiza el fabricante antes de la rotura del cable.<br><br>
          <strong>Factor de seguridad mínimo:</strong> La API recomienda <strong>mínimo 3:1</strong> para cables de perforación activos, pero en la industria se trabaja con factores de 5:1 a 10:1.<br><br>
          <strong>Módulo de elasticidad:</strong> Aproximadamente <strong>12,000,000 – 14,000,000 psi</strong> dependiendo de la construcción del cable.<br><br>
          <strong>Elongación:</strong> Los cables preformados tienen menor elongación permanente inicial que los no preformados.
        </div>
      </div>
    `,
    quiz: { q:"¿Cuál grado de cable tiene MAYOR resistencia a la rotura según API 9A?", opts:["PS (Plow Steel)","IPS (Improved Plow Steel)","EIPS (Extra Improved Plow Steel)","EEIPS (Extra Extra Improved Plow Steel)"], ans:3, fb:"¡Muy bien! EEIPS (Extra Extra Improved Plow Steel) es el grado de mayor resistencia. Cada nivel agrega aproximadamente 7.5% más de resistencia sobre el anterior, siendo PS el de menor y EEIPS el de mayor resistencia." }
  },
  {
    id:4, tag:"Capítulo 4", title:"Dimensiones y tolerancias",
    content: `
      <div class="card">
        <div class="card-title">Diámetro nominal y tolerancias</div>
        <div class="card-body">La API 9A establece que el diámetro medido del cable debe estar <strong>dentro de la tolerancia</strong> del diámetro nominal especificado. La medición debe hacerse con un calibrador de mordazas anchas sobre el punto de mayor diámetro del cable.</div>
      </div>
      <div class="table-wrap">
        <table>
          <tr><th>Diámetro nominal</th><th>Tolerancia permitida</th></tr>
          <tr><td>Hasta 3/4" (19mm)</td><td>+5% / -1%</td></tr>
          <tr><td>Mayor a 3/4"</td><td>+4% / -1%</td></tr>
        </table>
      </div>
      <div class="warn-box"><p><strong>¡Atención!</strong> Un cable sobredimensionado puede no entrar en las roldanas y el tambor. Un cable subdimensionado puede tener resistencia menor a la nominal. La tolerancia positiva siempre es mayor que la negativa para proteger la seguridad.</p></div>
      <div class="card">
        <div class="card-title">Medición correcta del diámetro</div>
        <div class="card-body">
          <strong>Herramienta:</strong> Calibrador de quijadas anchas (no un vernier de puntas)<br><br>
          <strong>Posición:</strong> Medir sobre el punto más alto de los torones exteriores (punto de mayor diámetro)<br><br>
          <strong>Número de mediciones:</strong> Mínimo 3 puntos separados al menos 1 metro entre sí<br><br>
          <strong>Resultado:</strong> Usar el promedio de las mediciones para comparar con la tolerancia nominal
        </div>
      </div>
      <div class="highlight-box"><p>Para cables de drilling line comunes en taladros colombianos: <strong>1-1/8", 1-1/4", 1-3/8" y 1-1/2"</strong> de diámetro nominal son los más utilizados según la capacidad del taladro.</p></div>
    `,
    quiz: { q:"¿Con qué herramienta se mide correctamente el diámetro de un cable API 9A?", opts:["Calibrador de puntas (vernier estándar)","Cinta métrica flexible","Calibrador de quijadas anchas","Micrómetro de exteriores"], ans:2, fb:"¡Correcto! Se usa un calibrador de quijadas anchas (jaw caliper) para medir el diámetro real del cable sobre el punto más alto de los torones exteriores. Un calibrador de puntas daría una medición incorrecta al entrar entre los torones." }
  },
  {
    id:5, tag:"Capítulo 5", title:"Lubricación del cable",
    content: `
      <div class="card">
        <div class="card-title">¿Por qué es crítica la lubricación?</div>
        <div class="card-body">La lubricación es un requisito de fábrica en la API 9A. Los cables deben ser lubricados durante su fabricación y requieren re-lubricación periódica en campo para:<br><br>
        • Reducir la fricción interna entre alambres y torones<br>
        • Proteger contra corrosión<br>
        • Reducir el desgaste por fatiga<br>
        • Sellar los espacios internos del cable</div>
      </div>
      <div class="table-wrap">
        <table>
          <tr><th>Tipo de lubricante</th><th>Característica</th><th>Aplicación</th></tr>
          <tr><td>Penetrante</td><td>Baja viscosidad, penetra al alma</td><td>Mantenimiento preventivo</td></tr>
          <tr><td>Adherente</td><td>Alta viscosidad, protección exterior</td><td>Ambientes corrosivos</td></tr>
          <tr><td>Grafitado</td><td>Sólidos lubricantes (grafito)</td><td>Cables de alta carga</td></tr>
        </table>
      </div>
      <div class="highlight-box"><p><strong>Método de aplicación en campo:</strong> La lubricación se aplica mientras el cable está en movimiento (izado o bajando). Se usan aplicadores automáticos (lubricators) presarizados o aplicación manual con brocha/espátula en zonas de reposo.</p></div>
      <div class="warn-box"><p><strong>Nunca lubricar con:</strong> Aceite quemado, diésel, ni productos de baja calidad. Estos pueden dañar las fibras del alma (en cables FC) y atraer contaminantes abrasivos que aceleran el desgaste.</p></div>
    `,
    quiz: { q:"¿Cuál es el principal objetivo de la lubricación de un cable según API 9A?", opts:["Aumentar el diámetro nominal del cable","Reducir fricción interna, corrosión y desgaste por fatiga","Mejorar la visibilidad del cable para inspección","Facilitar el corte del cable durante el slip & cut"], ans:1, fb:"¡Perfecto! La lubricación tiene como objetivo principal reducir la fricción interna entre los alambres, proteger contra la corrosión y reducir el desgaste por fatiga. Un cable bien lubricado puede durar hasta 3 veces más que uno sin mantenimiento." }
  },
  {
    id:6, tag:"Capítulo 6", title:"Inspección y criterios de retiro",
    content: `
      <div class="card">
        <div class="card-title">Tipos de inspección según API 9A</div>
        <div class="card-body">
          <strong>Inspección visual:</strong> Diaria por el encuellador/perforador. Revisa alambres rotos visibles, kinks, aplastamientos y corrosión.<br><br>
          <strong>Inspección dimensional:</strong> Semanal o según plan de mantenimiento. Mide diámetro real vs nominal.<br><br>
          <strong>Inspección por magnaflux (MFL):</strong> Detecta pérdida de sección metálica (LMA) y discontinuidades (LF) en el interior del cable mediante campo magnético.
        </div>
      </div>
      <div class="card">
        <div class="card-title">Criterios de retiro (discard criteria)</div>
        <div class="card-body">La norma API 9A, en conjunto con API RP 9B, establece que un cable debe retirarse cuando:<br><br>
          <strong>1. Alambres rotos:</strong><br>
          • 6 alambres rotos en un torón en cualquier longitud de 1 paso de cable<br>
          • 3 alambres rotos en un torón en cualquier longitud de 1 paso<br>
          • 12 alambres rotos distribuidos en cualquier segmento de 12 diámetros de longitud<br><br>
          <strong>2. Reducción de diámetro:</strong> Mayor al 3% del diámetro nominal<br><br>
          <strong>3. Daño mecánico:</strong> Kink (doblez permanente), aplastamiento (birdcage), torceduras<br><br>
          <strong>4. Corrosión severa:</strong> Picadura profunda o corrosión uniforme severa que reduce sección
        </div>
      </div>
      <div class="warn-box"><p><strong>Regla práctica en campo:</strong> Ante la duda, el cable sale. El costo de un cable nuevo es insignificante frente al costo de una operación de pesca o un accidente.</p></div>
    `,
    quiz: { q:"¿Cuántos alambres rotos distribuidos en 12 diámetros de longitud justifican el retiro del cable?", opts:["6 alambres rotos","9 alambres rotos","12 alambres rotos","3 alambres rotos"], ans:2, fb:"¡Correcto! Si se encuentran 12 o más alambres rotos distribuidos en cualquier segmento de 12 diámetros de longitud del cable, este debe ser retirado de servicio inmediatamente según la API 9A/RP 9B." }
  },
  {
    id:7, tag:"Capítulo 7", title:"Slip & Cut — Programa de cable",
    content: `
      <div class="card">
        <div class="card-title">¿Qué es el Slip & Cut?</div>
        <div class="card-body">El Slip & Cut (deslizar y cortar) es el procedimiento de gestión del cable de perforación (drilling line) que consiste en <strong>deslizar el cable hacia adelante</strong> (agregar cable nuevo desde el carrete hacia el sistema) y <strong>cortar el tramo más desgastado</strong> del extremo del tambor. Esto distribuye el desgaste uniformemente a lo largo del cable.</div>
      </div>
      <div class="highlight-box"><p><strong>¿Por qué se hace?</strong> Durante las operaciones de perforación, el cable se dobla repetidamente en los mismos puntos (sheaves y tambor). El Slip & Cut reemplaza esas zonas fatigadas con cable en buenas condiciones.</p></div>
      <div class="card">
        <div class="card-title">Toneladas-milla (Ton-Miles)</div>
        <div class="card-body">La unidad de medida del trabajo acumulado del cable en la industria es <strong>toneladas-milla (T-M)</strong>. Se calcula integrando la carga × distancia recorrida por el bloque viajero.<br><br>
          <strong>Fórmula básica:</strong><br>
          <em>T-M = (Carga total × Distancia recorrida por bloque) / 2640</em><br><br>
          Las compañías establecen intervalos de Slip & Cut según toneladas-milla acumuladas (ej: cada 1,000 T-M, cada 2,500 T-M según el cable y las condiciones).
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <tr><th>Factor</th><th>Impacto en T-M de Slip & Cut</th></tr>
          <tr><td>Mayor profundidad de pozo</td><td>Más T-M por viaje → Slip & Cut más frecuente</td></tr>
          <tr><td>Mayor diámetro de cable</td><td>Mayor capacidad → intervalos más largos</td></tr>
          <tr><td>Más roldanas en el aparejo</td><td>Más dobleces → mayor fatiga</td></tr>
          <tr><td>Condiciones corrosivas H2S</td><td>Reducir intervalo S&C</td></tr>
        </table>
      </div>
    `,
    quiz: { q:"¿Cuál es el objetivo principal del procedimiento de Slip & Cut?", opts:["Aumentar la longitud total del cable en el tambor","Distribuir el desgaste uniformemente reemplazando zonas fatigadas","Reducir el costo de mantenimiento del cable","Cambiar la dirección del lay del cable"], ans:1, fb:"¡Excelente! El Slip & Cut distribuye el desgaste a lo largo de todo el cable al mover las zonas más fatigadas fuera del sistema activo y cortar esa sección. Esto maximiza la vida útil del cable y mantiene la seguridad de la operación." }
  },
  {
    id:8, tag:"Capítulo 8", title:"Marcado, documentación y trazabilidad",
    content: `
      <div class="card">
        <div class="card-title">Requisitos de marcado API 9A</div>
        <div class="card-body">Cada cable certificado bajo API 9A debe tener identificación que incluya:<br><br>
          • <strong>Nombre o marca del fabricante</strong><br>
          • <strong>Diámetro nominal</strong><br>
          • <strong>Construcción</strong> (clasificación de torones y alambres)<br>
          • <strong>Grado del alambre</strong> (EIPS, EEIPS, etc.)<br>
          • <strong>Tipo de alma</strong> (FC, IWRC, WSC)<br>
          • <strong>Tipo de lay</strong> (RRL, LRL, etc.)<br>
          • <strong>Longitud del carrete</strong><br>
          • <strong>Número de carrete o lote</strong><br>
          • <strong>Logo o monograma API</strong> (si aplica certificación)
        </div>
      </div>
      <div class="card">
        <div class="card-title">Documentos requeridos (Mill Certificate)</div>
        <div class="card-body">El fabricante debe proveer un <strong>certificado de prueba de fábrica (mill test certificate / MTC)</strong> que contenga:<br><br>
          • Resultados de prueba de tensión a rotura<br>
          • Diámetro medido en fábrica<br>
          • Composición química del alambre<br>
          • Número de colada o heat number<br>
          • Declaración de conformidad con API 9A
        </div>
      </div>
      <div class="highlight-box"><p><strong>Monograma API:</strong> El monograma API en un cable certifica que el producto fue fabricado bajo un sistema de calidad auditado por API. Es un requisito en muchas operaciones offshore y contratos internacionales.</p></div>
      <div class="warn-box"><p><strong>En campo:</strong> Nunca aceptar un cable sin su Mill Test Certificate. El MTC es la evidencia de que el cable cumple las propiedades mecánicas especificadas. Sin él, el cable no debe usarse.</p></div>
    `,
    quiz: { q:"¿Qué documento emite el fabricante para certificar que el cable cumple la API 9A?", opts:["Hoja de seguridad MSDS","Mill Test Certificate (MTC)","Certificado de calibración","Registro de inspección visual"], ans:1, fb:"¡Correcto! El Mill Test Certificate (MTC) es el documento de trazabilidad emitido por el fabricante que contiene los resultados de las pruebas mecánicas, composición química y declaración de conformidad con la API 9A. Es obligatorio en toda recepción de cable." }
  },
  {
    id:9, tag:"Evaluación final", title:"Pon a prueba todo lo aprendido",
    isFinal: true,
    questions:[
      { q:"¿Cuántos torones tiene un cable clasificado como 6×26 IWRC?", opts:["26 torones","6 torones","19 torones","8 torones"], ans:1 },
      { q:"¿Qué tipo de alma ofrece MAYOR resistencia mecánica?", opts:["FC (Fiber Core)","WSC (Wire Strand Core)","IWRC (Independent Wire Rope Core)","Todas ofrecen la misma resistencia"], ans:2 },
      { q:"¿Qué grado de cable tiene mayor resistencia a la rotura?", opts:["PS","IPS","EIPS","EEIPS"], ans:3 },
      { q:"La unidad de medida del trabajo acumulado del cable de perforación es:", opts:["PSI","Toneladas-milla (T-M)","Kilonewton-metro","Libras-pie"], ans:1 },
      { q:"¿Cuál daño mecánico obliga al retiro inmediato del cable?", opts:["Lubricación insuficiente","Un kink o doblez permanente","Suciedad superficial","Color oscuro por oxidación leve"], ans:1 },
    ]
  }
];

let currentModule = 0;
let completedModules = [];
let quizAnswered = [];
let finalAnswers = [];
let finalScore = 0;

function renderModule(idx) {
  const m = modules[idx];
  const app = document.getElementById('app');
  const progress = (idx / (modules.length - 1)) * 100;

  if (m.isFinal) {
    renderFinal();
    return;
  }

  const sectionBtns = modules.map((mod, i) => {
    let cls = 'section-btn';
    if (i === idx) cls += ' active';
    else if (completedModules.includes(i)) cls += ' done';
    return `<button class="${cls}" onclick="goTo(${i})">${mod.tag}</button>`;
  }).join('');

  app.innerHTML = `
    <h2 class="sr-only">Capacitación API 9A — ${m.title}</h2>
    <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
    <div class="section-nav">${sectionBtns}</div>
    <div class="module-header">
      <div class="module-tag">${m.tag}</div>
      <div class="module-title">${m.title}</div>
    </div>
    ${m.content}
    <div class="card" id="quiz-area">
      <div class="card-title" style="margin-bottom:1rem">Pregunta de verificación</div>
      <div class="card-body" style="margin-bottom:1rem;font-size:15px;color:var(--color-text-primary)">${m.quiz.q}</div>
      ${m.quiz.opts.map((o,i) => `<button class="quiz-option" id="opt-${i}" onclick="answerQuiz(${i}, ${m.quiz.ans}, '${m.quiz.fb.replace(/'/g,"\\'")}', ${idx})">${o}</button>`).join('')}
      <div id="quiz-feedback" class="hidden"></div>
    </div>
    <div class="nav-row">
      <button class="btn" onclick="goTo(${idx - 1})" ${idx===0?'disabled':''}>← Anterior</button>
      <button class="btn primary" id="btn-next" onclick="goTo(${idx + 1})" disabled>Siguiente →</button>
    </div>
  `;

  if (quizAnswered[idx] !== undefined) {
    restoreQuiz(idx);
  }
}

function answerQuiz(selected, correct, feedback, modIdx) {
  if (quizAnswered[modIdx] !== undefined) return;
  quizAnswered[modIdx] = selected;
  const opts = document.querySelectorAll('.quiz-option');
  opts.forEach((btn, i) => {
    btn.disabled = true;
    if (i === correct) btn.classList.add('correct');
    else if (i === selected && selected !== correct) btn.classList.add('wrong');
  });
  const fb = document.getElementById('quiz-feedback');
  fb.className = 'feedback ' + (selected === correct ? 'ok' : 'no');
  fb.textContent = selected === correct ? '✓ ' + feedback : '✗ No es correcto. ' + feedback;
  fb.classList.remove('hidden');
  if (!completedModules.includes(modIdx)) completedModules.push(modIdx);
  document.getElementById('btn-next').disabled = false;
}

function restoreQuiz(modIdx) {
  const m = modules[modIdx];
  const selected = quizAnswered[modIdx];
  const correct = m.quiz.ans;
  const opts = document.querySelectorAll('.quiz-option');
  opts.forEach((btn, i) => {
    btn.disabled = true;
    if (i === correct) btn.classList.add('correct');
    else if (i === selected && selected !== correct) btn.classList.add('wrong');
  });
  const fb = document.getElementById('quiz-feedback');
  fb.className = 'feedback ' + (selected === correct ? 'ok' : 'no');
  fb.textContent = selected === correct ? '✓ ' + m.quiz.fb : '✗ No es correcto. ' + m.quiz.fb;
  fb.classList.remove('hidden');
  document.getElementById('btn-next').disabled = false;
}

function goTo(idx) {
  if (idx < 0 || idx >= modules.length) return;
  currentModule = idx;
  renderModule(idx);
  window.scrollTo(0,0);
}

function renderFinal() {
  const app = document.getElementById('app');
  const m = modules[modules.length - 1];
  const progress = 100;

  const sectionBtns = modules.map((mod, i) => {
    let cls = 'section-btn';
    if (i === modules.length - 1) cls += ' active';
    else if (completedModules.includes(i)) cls += ' done';
    return `<button class="${cls}" onclick="goTo(${i})">${mod.tag}</button>`;
  }).join('');

  app.innerHTML = `
    <h2 class="sr-only">Evaluación final API 9A</h2>
    <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
    <div class="section-nav">${sectionBtns}</div>
    <div class="module-header">
      <div class="module-tag">${m.tag}</div>
      <div class="module-title">${m.title}</div>
      <div class="module-sub">Responde las siguientes preguntas. Al final verás tu resultado.</div>
    </div>
    <div id="final-questions">
      ${m.questions.map((q,qi) => `
        <div class="card" id="fq-${qi}">
          <div class="card-title" style="margin-bottom:0.75rem">${qi+1}. ${q.q}</div>
          ${q.opts.map((o,oi) => `<button class="quiz-option" id="fopt-${qi}-${oi}" onclick="answerFinal(${qi},${oi},${q.ans})">${o}</button>`).join('')}
          <div id="ffb-${qi}" class="hidden"></div>
        </div>
      `).join('')}
      <div class="nav-row">
        <button class="btn" onclick="goTo(${modules.length - 2})">← Anterior</button>
        <button class="btn primary" id="btn-score" onclick="showScore()" disabled>Ver mi resultado →</button>
      </div>
    </div>
    <div id="final-result" class="hidden"></div>
  `;
  finalAnswers = new Array(m.questions.length).fill(undefined);
  checkAllAnswered();
}

function answerFinal(qi, selected, correct) {
  if (finalAnswers[qi] !== undefined) return;
  finalAnswers[qi] = selected;
  const opts = document.querySelectorAll(`#fq-${qi} .quiz-option`);
  opts.forEach((btn, i) => {
    btn.disabled = true;
    if (i === correct) btn.classList.add('correct');
    else if (i === selected && selected !== correct) btn.classList.add('wrong');
  });
  const fb = document.getElementById(`ffb-${qi}`);
  fb.className = 'feedback ' + (selected === correct ? 'ok' : 'no');
  fb.textContent = selected === correct ? '✓ ¡Correcto!' : '✗ La respuesta correcta era: ' + modules[modules.length-1].questions[qi].opts[correct];
  fb.classList.remove('hidden');
  checkAllAnswered();
}

function checkAllAnswered() {
  const total = modules[modules.length-1].questions.length;
  const answered = finalAnswers.filter(a => a !== undefined).length;
  const btn = document.getElementById('btn-score');
  if (btn) btn.disabled = answered < total;
}

function showScore() {
  const qs = modules[modules.length-1].questions;
  finalScore = finalAnswers.reduce((acc, ans, i) => acc + (ans === qs[i].ans ? 1 : 0), 0);
  const pct = Math.round((finalScore / qs.length) * 100);
  let medal = pct >= 80 ? '🏆' : pct >= 60 ? '👍' : '📚';
  let msg = pct >= 80
    ? '¡Excelente! Dominas los fundamentos de la norma API 9A. Estás listo para aplicarla en campo.'
    : pct >= 60
    ? 'Buen resultado. Repasa los módulos en rojo para reforzar los temas donde tuviste dudas.'
    : 'Sigue estudiando. Repasa los módulos con más atención y vuelve a intentarlo.';

  const resultDiv = document.getElementById('final-result');
  resultDiv.innerHTML = `
    <div class="card" style="text-align:center;padding:2rem">
      <div style="font-size:48px;margin-bottom:0.5rem">${medal}</div>
      <div style="font-size:13px;color:var(--color-text-secondary);margin-bottom:0.25rem">Tu puntaje</div>
      <div style="font-size:48px;font-weight:500;color:#1D9E75;margin-bottom:0.5rem">${finalScore}/${qs.length}</div>
      <div style="font-size:28px;font-weight:500;color:var(--color-text-primary);margin-bottom:1rem">${pct}%</div>
      <div style="font-size:14px;color:var(--color-text-secondary);line-height:1.7;max-width:400px;margin:0 auto">${msg}</div>
      <div class="nav-row" style="justify-content:center;margin-top:1.5rem">
        <button class="btn" onclick="goTo(0)">Repasar desde el inicio</button>
        <button class="btn primary" onclick="sendPrompt('Tengo dudas sobre la norma API 9A, ¿puedes explicarme más sobre los criterios de retiro y el Slip & Cut?')">Preguntar a Claude ↗</button>
      </div>
    </div>
  `;
  resultDiv.classList.remove('hidden');
  document.getElementById('final-questions').classList.add('hidden');
}

renderModule(0);
</script>
